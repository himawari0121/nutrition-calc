<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="栄養計算">
<meta name="theme-color" content="#1e40af">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%231e40af'/><text x='50%25' y='54%25' font-size='88' font-family='sans-serif' fill='white' text-anchor='middle' dominant-baseline='middle' font-weight='bold'>栄</text></svg>">
<title>1日栄養計算 — 計算補助ツール</title>
<style>
/* ===== 基本設定 ===== */
:root{
  --bg:#f5f7fa;
  --surface:#ffffff;
  --surface-alt:#f1f5f9;
  --border:#e2e8f0;
  --border-strong:#cbd5e1;
  --text:#0f172a;
  --text-muted:#64748b;
  --text-dim:#94a3b8;
  --primary:#1e40af;
  --primary-alt:#2563eb;
  --primary-light:#dbeafe;
  --accent:#0e7490;
  --accent-light:#cffafe;
  --danger:#b91c1c;
  --danger-light:#fee2e2;
  --warning:#b45309;
  --warning-light:#fef3c7;
  --success:#047857;
  --success-light:#d1fae5;
  --shadow-sm:0 1px 2px rgba(15,23,42,.06);
  --shadow-md:0 4px 16px rgba(15,23,42,.10);
  --radius:10px;
  --radius-sm:6px;
  --tap:44px;
  --header-h:52px;
  --tabs-h:44px;
  --summary-h:64px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;
  font-size:15px;
  line-height:1.5;
  color:var(--text);
  background:var(--bg);
  -webkit-text-size-adjust:100%;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:contain;
}
button{font-family:inherit;font-size:inherit;color:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type="number"]{-moz-appearance:textfield}
.num{font-variant-numeric:tabular-nums}

/* ===== レイアウト ===== */
#app{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding-bottom:calc(var(--summary-h) + env(safe-area-inset-bottom));
}
.app-header{
  position:sticky;top:0;z-index:30;
  background:var(--primary);
  color:#fff;
  padding:6px 10px;
  padding-top:calc(6px + env(safe-area-inset-top));
  box-shadow:var(--shadow-sm);
}
.app-header-row{
  display:flex;align-items:center;gap:8px;min-height:40px;
}
.app-title{
  font-weight:700;font-size:15px;letter-spacing:.02em;
  display:flex;align-items:baseline;gap:6px;white-space:nowrap;
}
.app-title small{font-size:10.5px;font-weight:400;opacity:.85}
.current-record{
  flex:1;min-width:0;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.3);
  color:#fff;
  border-radius:var(--radius-sm);
  padding:6px 10px;
  font-size:13px;
  height:36px;
  display:flex;align-items:center;gap:6px;
  overflow:hidden;
}
.current-record-name{
  flex:1;min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.header-btn{
  background:rgba(255,255,255,.18);
  color:#fff;
  border:1px solid rgba(255,255,255,.3);
  padding:0 10px;height:36px;
  border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;
  white-space:nowrap;
}
.header-btn:active{background:rgba(255,255,255,.32)}

/* タブ */
.tabs{
  position:sticky;top:calc(var(--header-h) + env(safe-area-inset-top));
  z-index:20;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;
  overflow-x:auto;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{
  flex:1 0 auto;min-width:64px;
  background:transparent;border:none;
  padding:0 10px;height:var(--tabs-h);
  font-size:14px;font-weight:600;
  color:var(--text-muted);
  border-bottom:3px solid transparent;
  white-space:nowrap;
}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-btn:active{background:var(--surface-alt)}

/* メイン */
main{flex:1;padding:10px 10px 4px}
.tab-panel{display:none}
.tab-panel.active{display:block}

.panel-toolbar{
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;flex-wrap:wrap;
}
.panel-title{font-size:16px;font-weight:700;margin:0}
.panel-toolbar .spacer{flex:1}

/* ボタン共通 */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:4px;
  min-height:var(--tap);padding:0 14px;
  border:1px solid var(--border-strong);
  background:var(--surface);color:var(--text);
  border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;
  white-space:nowrap;
}
.btn:active{background:var(--surface-alt)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:active{background:#1e3a8a}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-outline{background:var(--surface);color:var(--primary);border-color:var(--primary)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-muted)}
.btn-sm{min-height:34px;padding:0 10px;font-size:13px;border-radius:6px}
.btn-icon{
  min-height:36px;min-width:36px;padding:0 8px;
  border:1px solid var(--border-strong);background:var(--surface);
  border-radius:6px;font-size:14px;
}
.btn-block{width:100%}

/* 行（入力行） */
.line-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:10px;
  margin-bottom:10px;
  box-shadow:var(--shadow-sm);
}
.line-head{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.line-index{
  font-size:11px;color:var(--text-muted);
  background:var(--surface-alt);padding:2px 6px;border-radius:4px;
  min-width:28px;text-align:center;
}
.product-btn{
  flex:1;min-width:0;
  display:flex;align-items:center;gap:6px;
  height:40px;padding:0 10px;
  background:var(--surface);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;text-align:left;
  overflow:hidden;
}
.product-btn.empty{color:var(--text-muted);font-weight:500}
.product-btn-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.product-btn-chev{color:var(--text-muted);font-size:12px}

.line-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.qty-input{
  width:78px;height:40px;
  border:1px solid var(--border-strong);
  background:var(--surface);
  border-radius:var(--radius-sm);
  padding:0 10px;font-size:16px;
  text-align:right;
  font-variant-numeric:tabular-nums;
}
.qty-unit{font-size:13px;color:var(--text-muted);min-width:40px}
.memo-input{
  flex:1;min-width:120px;height:36px;
  border:1px solid var(--border);
  background:var(--surface);
  border-radius:var(--radius-sm);
  padding:0 10px;font-size:13px;
}

/* 摂取割合 */
.ratio-wrap{margin-bottom:8px}
.ratio-label{font-size:12px;color:var(--text-muted);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.ratio-selected{color:var(--primary);font-weight:700}
.ratio-buttons{
  display:grid;
  grid-template-columns:repeat(11,1fr);
  gap:3px;
}
.ratio-btn{
  min-height:36px;padding:0;
  border:1px solid var(--border-strong);
  background:var(--surface);color:var(--text);
  border-radius:6px;
  font-size:12px;font-weight:600;
  font-variant-numeric:tabular-nums;
}
.ratio-btn.active{
  background:var(--primary);color:#fff;border-color:var(--primary);
}
.ratio-btn:active{background:var(--primary-light)}
.ratio-btn.active:active{background:#1e3a8a}
.ratio-custom{
  display:flex;align-items:center;gap:6px;margin-top:6px;
  font-size:12px;color:var(--text-muted);
}
.ratio-custom input{
  width:60px;height:32px;
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  padding:0 8px;font-size:14px;text-align:right;
  font-variant-numeric:tabular-nums;
}

/* 行小計 */
.line-sub{
  background:var(--surface-alt);
  border-radius:var(--radius-sm);
  padding:8px 10px;
  font-size:12.5px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:8px;
}
.line-sub-metrics{
  display:flex;flex-wrap:wrap;gap:4px 10px;
  color:var(--text);
  font-variant-numeric:tabular-nums;
}
.line-sub-metrics .m-label{color:var(--text-muted);margin-right:2px}
.line-sub-actions{display:flex;gap:6px;flex-shrink:0}

/* セクション小計 */
.section-sub{
  background:var(--primary-light);
  border:1px solid #bfdbfe;
  border-radius:var(--radius);
  padding:10px 12px;
  margin:12px 0;
}
.section-sub-title{
  font-size:13px;font-weight:700;color:var(--primary);
  margin-bottom:6px;
}
.section-sub-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:6px 12px;font-size:13.5px;
  font-variant-numeric:tabular-nums;
}
.section-sub-grid div{display:flex;justify-content:space-between;gap:6px}
.section-sub-grid .k{color:var(--text-muted);font-size:12px}
.section-sub-grid .v{font-weight:700}
.section-sub-grid .v.unset{color:var(--text-dim);font-weight:500}
.section-sub-grid .v.partial::after{content:"*";color:var(--warning);margin-left:1px}
.section-sub-note{font-size:11px;color:var(--text-muted);margin-top:6px}

/* 合計タブ */
.total-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:12px;
  margin-bottom:12px;
  box-shadow:var(--shadow-sm);
}
.total-card h3{
  margin:0 0 8px;font-size:14px;font-weight:700;color:var(--primary);
  display:flex;align-items:center;gap:6px;
}
.total-card.grand h3{color:var(--accent)}
.total-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:4px 10px;font-size:14px;
  font-variant-numeric:tabular-nums;
}
.total-grid .row{
  display:flex;justify-content:space-between;
  padding:4px 0;border-bottom:1px dashed var(--border);
}
.total-grid .row:last-child{border-bottom:none}
.total-grid .k{color:var(--text-muted);font-size:12.5px}
.total-grid .v{font-weight:700}
.total-grid .v.unset{color:var(--text-dim);font-weight:500}
.total-grid .v.partial::after{content:"*";color:var(--warning);margin-left:1px}

/* 食事スロット切替 */
.meal-slot-tabs{
  display:flex;gap:4px;margin-bottom:10px;
  background:var(--surface-alt);
  padding:3px;border-radius:8px;
}
.meal-slot-tab{
  flex:1;min-height:38px;
  background:transparent;border:none;
  border-radius:6px;
  font-size:13px;font-weight:600;
  color:var(--text-muted);
}
.meal-slot-tab.active{
  background:var(--surface);color:var(--primary);
  box-shadow:var(--shadow-sm);
}
.meal-slot-tab .badge{
  display:inline-block;background:var(--primary-light);color:var(--primary);
  font-size:10px;padding:1px 5px;border-radius:8px;margin-left:4px;font-weight:700;
}

/* マスタリスト */
.master-type-tabs{
  display:flex;gap:4px;margin-bottom:10px;
  background:var(--surface-alt);
  padding:3px;border-radius:8px;
}
.master-type-tab{
  flex:1;min-height:38px;
  background:transparent;border:none;
  border-radius:6px;
  font-size:13px;font-weight:600;
  color:var(--text-muted);
}
.master-type-tab.active{
  background:var(--surface);color:var(--primary);
  box-shadow:var(--shadow-sm);
}
.master-search{
  width:100%;height:40px;
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  padding:0 12px;font-size:14px;
  margin-bottom:8px;
  background:var(--surface);
}
.master-sort{
  display:flex;gap:4px;margin-bottom:10px;font-size:12px;align-items:center;
  color:var(--text-muted);
}
.master-sort select{
  height:32px;border:1px solid var(--border-strong);
  border-radius:6px;padding:0 6px;font-size:12px;background:var(--surface);
}
.master-item{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:10px;margin-bottom:8px;
  display:flex;align-items:flex-start;gap:8px;
  box-shadow:var(--shadow-sm);
}
.master-item-body{flex:1;min-width:0}
.master-name{
  font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px;
}
.master-name .star{color:#f59e0b}
.master-cat{font-size:11.5px;color:var(--text-muted);margin-top:1px}
.master-nutri{
  font-size:12px;color:var(--text);
  margin-top:4px;
  font-variant-numeric:tabular-nums;
  display:flex;flex-wrap:wrap;gap:2px 8px;
}
.master-nutri .nu{color:var(--text-muted)}
.master-item-actions{display:flex;flex-direction:column;gap:4px}

/* データ（記録一覧） */
.record-item{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:10px 12px;margin-bottom:8px;
  box-shadow:var(--shadow-sm);
}
.record-item.current{border-color:var(--primary);background:#fafbff}
.record-head{display:flex;align-items:center;gap:8px}
.record-name{flex:1;font-weight:700;font-size:14px;min-width:0}
.record-current-tag{
  background:var(--primary);color:#fff;font-size:10px;
  padding:1px 6px;border-radius:8px;font-weight:700;
}
.record-meta{font-size:11.5px;color:var(--text-muted);margin-top:2px}
.record-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}

/* サマリーバー（固定） */
.summary-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:25;
  background:#0f172a;color:#fff;
  padding:8px 10px;
  padding-bottom:calc(8px + env(safe-area-inset-bottom));
  box-shadow:0 -4px 16px rgba(0,0,0,.15);
}
.summary-title{
  font-size:10.5px;letter-spacing:.08em;color:#94a3b8;margin-bottom:2px;
  display:flex;justify-content:space-between;align-items:center;
}
.summary-grid{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:2px 6px;
  font-variant-numeric:tabular-nums;
}
.summary-item{display:flex;flex-direction:column;align-items:flex-start;min-width:0}
.summary-item .k{font-size:10px;color:#94a3b8}
.summary-item .v{font-size:14px;font-weight:700;white-space:nowrap}
.summary-item .v.unset{color:#64748b;font-weight:500}
.summary-item .v.partial::after{content:"*";color:#fbbf24;margin-left:1px}

/* モーダル */
.modal-overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(15,23,42,.45);
  display:flex;align-items:flex-end;justify-content:center;
}
.modal-overlay[hidden]{display:none!important}
.modal-sheet{
  width:100%;max-width:640px;
  background:var(--surface);
  border-radius:16px 16px 0 0;
  max-height:90vh;
  display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom);
}
.modal-sheet.centered{
  border-radius:16px;
  margin:16px;max-height:calc(100vh - 32px);
}
.modal-overlay.centered-wrap{align-items:center}
.modal-head{
  padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.modal-head h3{margin:0;font-size:15px;flex:1}
.modal-body{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch}
.modal-foot{
  padding:10px 14px;border-top:1px solid var(--border);
  display:flex;gap:8px;
}

/* ピッカー */
.picker-search{
  width:100%;height:42px;
  border:1px solid var(--border-strong);
  border-radius:8px;padding:0 12px;font-size:15px;
  background:var(--surface);margin-bottom:8px;
}
.picker-filter-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.chip{
  display:inline-flex;align-items:center;
  height:30px;padding:0 10px;
  background:var(--surface);border:1px solid var(--border-strong);
  border-radius:15px;font-size:12px;font-weight:600;color:var(--text-muted);
}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.picker-list{display:flex;flex-direction:column;gap:4px}
.picker-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:10px;border:1px solid var(--border);
  border-radius:var(--radius-sm);background:var(--surface);
  text-align:left;min-height:48px;
}
.picker-item:active{background:var(--surface-alt)}
.picker-item-body{flex:1;min-width:0}
.picker-item .pname{font-weight:700;font-size:14px;display:flex;align-items:center;gap:4px}
.picker-item .pname .star{color:#f59e0b;font-size:12px}
.picker-item .pcat{font-size:11px;color:var(--text-muted);margin-top:1px}
.picker-item .pnutri{font-size:11.5px;color:var(--text);margin-top:2px;font-variant-numeric:tabular-nums}
.picker-empty{
  text-align:center;padding:24px;color:var(--text-muted);font-size:13px;
}

/* マスタ編集フォーム */
.form-group{margin-bottom:10px}
.form-group label{
  display:block;font-size:12px;color:var(--text-muted);
  font-weight:600;margin-bottom:3px;
}
.form-input,.form-select,.form-textarea{
  width:100%;height:40px;
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  padding:0 10px;font-size:15px;
  background:var(--surface);
}
.form-textarea{height:auto;min-height:60px;padding:8px 10px;resize:vertical}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.nutri-field{
  display:flex;align-items:center;gap:6px;
  border:1px solid var(--border);background:var(--surface-alt);
  border-radius:var(--radius-sm);padding:6px 8px;
}
.nutri-field label{margin:0;flex:1;font-size:12px}
.nutri-field input{
  width:88px;height:34px;
  border:1px solid var(--border-strong);background:var(--surface);
  border-radius:4px;padding:0 8px;font-size:14px;text-align:right;
  font-variant-numeric:tabular-nums;
}
.nutri-field .u{font-size:11px;color:var(--text-muted);min-width:28px}
.fav-toggle{
  display:flex;align-items:center;gap:8px;padding:10px;
  background:var(--surface-alt);border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;
}
.fav-toggle input{width:20px;height:20px}

/* トースト */
.toast{
  position:fixed;bottom:calc(var(--summary-h) + env(safe-area-inset-bottom) + 14px);
  left:50%;transform:translateX(-50%);
  background:#0f172a;color:#fff;
  padding:10px 16px;border-radius:20px;
  font-size:13px;font-weight:600;
  box-shadow:var(--shadow-md);
  z-index:60;
  max-width:calc(100% - 32px);
  text-align:center;
}
.toast[hidden]{display:none}

/* 空状態 */
.empty-state{
  text-align:center;padding:28px 16px;
  color:var(--text-muted);font-size:13px;
}
.empty-state .hint{font-size:12px;margin-top:6px;color:var(--text-dim)}

/* 注記 */
.disclaimer{
  font-size:11px;color:var(--text-muted);
  padding:6px 8px;background:var(--warning-light);
  border:1px solid #fde68a;border-radius:6px;
  margin-bottom:10px;line-height:1.4;
}
.disclaimer strong{color:var(--warning)}

/* iPad / デスクトップ */
@media (min-width:768px){
  main{max-width:720px;margin:0 auto;width:100%}
  .tabs{max-width:720px;margin:0 auto;width:100%}
  .app-header-row{max-width:720px;margin:0 auto;width:100%}

<script>
'use strict';

/* ======================================================================
 * 定数
 * ====================================================================== */
// 栄養指標の定義（共通 9 項目）
const METRICS = [
  { key: 'energy',  label: 'エネルギー',   short: 'kcal', unit: 'kcal', decimals: 0 },
  { key: 'protein', label: 'たんぱく質',   short: 'たん', unit: 'g',    decimals: 1 },
  { key: 'fat',     label: '脂質',         short: '脂質', unit: 'g',    decimals: 1 },
  { key: 'carb',    label: '糖質',         short: '糖質', unit: 'g',    decimals: 1 },
  { key: 'na',      label: 'ナトリウム',   short: 'Na',   unit: 'mEq',  decimals: 1 },
  { key: 'k',       label: 'カリウム',     short: 'K',    unit: 'mEq',  decimals: 1 },
  { key: 'mg',      label: 'マグネシウム', short: 'Mg',   unit: 'mg',   decimals: 1 },
  { key: 'p',       label: 'リン',         short: 'P',    unit: 'mg',   decimals: 1 },
  { key: 'water',   label: '水分',         short: '水分', unit: 'mL',   decimals: 1 },
];
// 点滴では追加でインスリン単位を扱う
const INSULIN_METRIC = { key: 'insulin', label: 'インスリン', short: 'Ins', unit: '単位', decimals: 1 };
const IV_METRICS = [...METRICS, INSULIN_METRIC];

// 食事スロット
const MEAL_SLOTS = [
  { key: 'breakfast', label: '朝食' },
  { key: 'lunch',     label: '昼食' },
  { key: 'dinner',    label: '夕食' },
  { key: 'snack',     label: '間食' },
];

// 保存キー
const STORAGE_KEY = 'nutriCalc_v1';

// サマリーに出す代表指標
const SUMMARY_KEYS = ['energy', 'protein', 'carb', 'water', 'insulin'];

/* ======================================================================
 * ユーティリティ
 * ====================================================================== */
function genId(prefix) {
  return (prefix || 'id') + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}
function todayStr() {
  const d = new Date();
  const z = (n) => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + z(d.getMonth() + 1) + '-' + z(d.getDate());
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, (c) => (
    { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
  ));
}
function parseNum(v) {
  if (v == null || v === '') return null;
  const n = Number(String(v).replace(/,/g, ''));
  return Number.isFinite(n) ? n : null;
}
function roundMetric(metric, value) {
  if (value == null) return null;
  const d = metric.decimals;
  if (d === 0) return Math.round(value);
  const p = Math.pow(10, d);
  return Math.round(value * p) / p;
}
function fmtMetric(metric, value, isPartial) {
  if (value == null) return isPartial ? '—' : '—';
  const rounded = roundMetric(metric, value);
  if (metric.decimals === 0) return String(rounded);
  return rounded.toFixed(metric.decimals);
}
function showToast(msg, ms) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.hidden = false;
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => { t.hidden = true; }, ms || 1800);
}

/* ======================================================================
 * 状態管理
 * ====================================================================== */
const state = {
  masters: { iv: [], meal: [], ons: [] },
  records: {},
  currentRecordId: null,
  recentProductUse: { iv: {}, meal: {}, ons: {} }, // masterId -> timestamp
  ui: {
    activeTab: 'iv',
    activeMealSlot: 'breakfast',
    activeMasterType: 'iv',
    masterSearch: '',
    masterSort: 'name',
    pickerSearch: '',
    pickerCategory: '',
  },
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const obj = JSON.parse(raw);
    if (obj.masters) state.masters = obj.masters;
    if (obj.records) state.records = obj.records;
    if (obj.currentRecordId) state.currentRecordId = obj.currentRecordId;
    if (obj.recentProductUse) state.recentProductUse = obj.recentProductUse;
    return true;
  } catch (e) {
    console.warn('load error', e);
    return false;
  }
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      version: 1,
      masters: state.masters,
      records: state.records,
      currentRecordId: state.currentRecordId,
      recentProductUse: state.recentProductUse,
    }));
  } catch (e) {
    console.warn('save error', e);
    showToast('保存に失敗しました（容量不足の可能性）');
  }
}

/* ======================================================================
 * サンプルマスタ（仮データ）
 *   ※実在製剤のデータではありません。運用時は編集または読み込みで差し替えてください。
 * ====================================================================== */
function buildMaster(type, name, category, unitName, nutrients, memo) {
  // null を既定としたフルセットに、指定された値をマージ
  const full = {
    energy: null, protein: null, fat: null, carb: null,
    na: null, k: null, mg: null, p: null, water: null,
  };
  if (type === 'iv') full.insulin = null;
  Object.assign(full, nutrients || {});
  return {
    id: genId(type),
    name: name,
    category: category || '',
    unitName: unitName || '1単位',
    nutrients: full,
    memo: memo || '',
    favorite: false,
  };
}

function initSampleMasters() {
  state.masters.iv = [
    buildMaster('iv', '点滴サンプルA（仮データ）', '末梢糖質輸液', '1本',
      { energy: 200, carb: 50, water: 500 },
      '例: 動作確認用。実データに差し替えてください。'),
    buildMaster('iv', 'インスリンサンプル（仮データ）', 'インスリン製剤', '1単位',
      { insulin: 1 },
      '例: 1単位あたりインスリン1単位のみ。エネルギーは未設定。'),
    buildMaster('iv', 'アミノ酸輸液サンプル（仮データ）', 'アミノ酸輸液', '1本',
      { energy: 80, protein: 20, water: 200 }),
    buildMaster('iv', '電解質輸液サンプル（仮データ）', '電解質輸液', '500mL',
      { na: 77, k: 0, water: 500 }),
  ];
  state.masters.meal = [
    buildMaster('meal', '食事サンプルA（仮データ）', '常食', '1食',
      { energy: 600, protein: 25, fat: 20, carb: 80, water: 300 },
      '例: 動作確認用。病院採用の献立データに差し替えてください。'),
    buildMaster('meal', '全粥サンプル（仮データ）', '全粥食', '1食',
      { energy: 400, protein: 15, fat: 10, carb: 60, water: 250 }),
    buildMaster('meal', '主食ごはんサンプル（仮データ）', '主食', '1膳',
      { energy: 250, protein: 4, fat: 0.5, carb: 55, water: 90 }),
  ];
  state.masters.ons = [
    buildMaster('ons', 'ONSサンプルA（仮データ）', '高エネルギー', '1本',
      { energy: 200, protein: 10, fat: 6, carb: 30, water: 125 }),
    buildMaster('ons', 'ONSサンプルB（仮データ）', '高たんぱく', '1本',
      { energy: 150, protein: 12, fat: 3, carb: 18, water: 100 }),
  ];
}

/* ======================================================================
 * 記録（レコード）
 * ====================================================================== */
function createRecord(name, date) {
  const d = date || todayStr();
  const n = name != null ? name : '';
  return {
    id: genId('rec'),
    date: d,
    name: n,
    iv: [],
    meal: { breakfast: [], lunch: [], dinner: [], snack: [] },
    ons: [],
    createdAt: Date.now(),
    updatedAt: Date.now(),
  };
}
function getCurrentRecord() {
  if (!state.currentRecordId || !state.records[state.currentRecordId]) {
    // 無ければ新規作成して現在のレコードに
    const rec = createRecord('', todayStr());
    state.records[rec.id] = rec;
    state.currentRecordId = rec.id;
    saveState();
  }
  return state.records[state.currentRecordId];
}
function touchRecord() {
  const r = getCurrentRecord();
  r.updatedAt = Date.now();
  saveState();
}

/* ======================================================================
 * 行オブジェクト
 * ====================================================================== */
function newIvLine() {
  return { id: genId('ln'), masterId: null, quantity: 1, memo: '' };
}
function newMealLine() {
  return { id: genId('ln'), masterId: null, quantity: 1, ratio: 10, memo: '' };
}
function newOnsLine() {
  return { id: genId('ln'), masterId: null, quantity: 1, ratio: 10, memo: '' };
}

function getMasterById(type, id) {
  if (!id) return null;
  return state.masters[type].find((m) => m.id === id) || null;
}
function trackProductUse(type, masterId) {
  if (!masterId) return;
  state.recentProductUse[type][masterId] = Date.now();
}

/* ======================================================================
 * 計算エンジン
 *
 * 設計:
 *  - 各マスタの栄養値は null（未入力）または数値。0 は「明示的に 0」。
 *  - 行の値 = 基準値 × 数量 ×（摂取割合/10、点滴は常に 1）
 *  - 合計:
 *      sum       : 設定されていた値だけの合計（なければ null）
 *      unsetCount: 「数量>0 にも関わらず未設定」だった件数
 *      totalQtyLines: 数量>0 の行数（指標共通）
 *  - 表示:
 *      sum==null && unsetCount==0  → 「0」扱い（行が無い・数量0のみ）→ "0"
 *      sum==null && unsetCount>0   → 全行未設定 → "—"
 *      sum!=null && unsetCount>0   → 一部未設定 → 値 + "*"
 *      sum!=null && unsetCount==0  → 値
 * ====================================================================== */
function makeSumBucket(keys) {
  const b = {};
  for (const k of keys) b[k] = { sum: null, unsetCount: 0 };
  return b;
}
function addToBucket(bucket, key, addition) {
  if (bucket[key].sum == null) bucket[key].sum = 0;
  bucket[key].sum += addition;
}

function sumLines(type, lines, useRatio) {
  const metricKeys = (type === 'iv') ? IV_METRICS.map((m) => m.key) : METRICS.map((m) => m.key);
  const bucket = makeSumBucket(metricKeys);
  let lineCount = 0;
  let activeLineCount = 0;
  for (const line of lines) {
    lineCount++;
    const master = getMasterById(type, line.masterId);
    if (!master) continue;
    const qty = parseNum(line.quantity);
    if (qty == null || qty === 0) continue;
    const ratioVal = useRatio ? (parseNum(line.ratio) != null ? parseNum(line.ratio) : 10) : 10;
    const ratio = useRatio ? (ratioVal / 10) : 1;
    if (useRatio && ratio === 0) continue;
    activeLineCount++;
    for (const k of metricKeys) {
      const base = master.nutrients[k];
      if (base == null) {
        bucket[k].unsetCount++;
      } else {
        addToBucket(bucket, k, base * qty * ratio);
      }
    }
  }
  return { bucket: bucket, lineCount: lineCount, activeLineCount: activeLineCount };
}

function combineBuckets(buckets, keys) {
  const out = makeSumBucket(keys);
  for (const b of buckets) {
    if (!b) continue;
    for (const k of keys) {
      const src = b[k];
      if (!src) continue;
      if (src.sum != null) {
        if (out[k].sum == null) out[k].sum = 0;
        out[k].sum += src.sum;
      }
      out[k].unsetCount += src.unsetCount;
    }
  }
  return out;
}

function computeAll(record) {
  // 点滴
  const ivLines = record.iv;
  const ivRes = sumLines('iv', ivLines, false);

  // 食事（スロット別 + 合算）
  const mealPerSlot = {};
  const mealBuckets = [];
  for (const slot of MEAL_SLOTS) {
    const r = sumLines('meal', record.meal[slot.key] || [], true);
    mealPerSlot[slot.key] = r;
    mealBuckets.push(r.bucket);
  }
  const mealTotal = combineBuckets(mealBuckets, METRICS.map((m) => m.key));

  // ONS
  const onsRes = sumLines('ons', record.ons, true);

  // 1日合計（共通 9 指標）
  const grand = combineBuckets(
    [ivRes.bucket, mealTotal, onsRes.bucket],
    METRICS.map((m) => m.key)
  );

  // 糖質インスリン比（点滴のみ）
  const ivCarbSum = ivRes.bucket.carb ? ivRes.bucket.carb.sum : null;
  const ivInsulinSum = ivRes.bucket.insulin ? ivRes.bucket.insulin.sum : null;
  let carbInsulinRatio = null;
  if (ivInsulinSum != null && ivInsulinSum > 0 && ivCarbSum != null) {
    carbInsulinRatio = ivCarbSum / ivInsulinSum;
  }

  return {
    iv: ivRes.bucket,
    ivActiveLines: ivRes.activeLineCount,
    mealPerSlot: mealPerSlot,
    meal: mealTotal,
    ons: onsRes.bucket,
    grand: grand,
    carbInsulinRatio: carbInsulinRatio,
    ivInsulinSum: ivInsulinSum,
  };
}

// 単一行の栄養（表示用）
function lineNutrients(type, line, useRatio) {
  const master = getMasterById(type, line.masterId);
  if (!master) return null;
  const qty = parseNum(line.quantity);
  if (qty == null) return null;
  const ratioVal = useRatio ? (parseNum(line.ratio) != null ? parseNum(line.ratio) : 10) : 10;
  const ratio = useRatio ? (ratioVal / 10) : 1;
  const out = {};
  const keys = (type === 'iv') ? IV_METRICS.map((m) => m.key) : METRICS.map((m) => m.key);
  for (const k of keys) {
    const base = master.nutrients[k];
    out[k] = (base == null) ? null : base * qty * ratio;
  }
  return out;
}

/* ======================================================================
 * レンダリング — 共通
 * ====================================================================== */
function render() {
  document.getElementById('current-record-name').textContent = renderCurrentRecordLabel();
  const activeTab = state.ui.activeTab;
  document.querySelectorAll('.tab-btn').forEach((b) => {
    b.classList.toggle('active', b.dataset.tab === activeTab);
  });
  document.querySelectorAll('.tab-panel').forEach((p) => {
    p.classList.toggle('active', p.dataset.tab === activeTab);
  });
  renderActivePanel();
  renderSummary();
}
function renderCurrentRecordLabel() {
  const r = getCurrentRecord();
  const name = r.name ? r.name : '（ケース名未設定）';
  return r.date + ' ' + name;
}
function renderActivePanel() {
  const tab = state.ui.activeTab;
  if (tab === 'iv')       renderIvPanel();
  else if (tab === 'meal') renderMealPanel();
  else if (tab === 'ons')  renderOnsPanel();
  else if (tab === 'totals') renderTotalsPanel();
  else if (tab === 'masters') renderMastersPanel();
  else if (tab === 'data') renderDataPanel();
}

function metricsBadgeHtml(metric, bucket) {
  const entry = bucket[metric.key] || { sum: null, unsetCount: 0 };
  let cls = 'v';
  let text;
  if (entry.sum == null && entry.unsetCount === 0) {
    text = '0';
  } else if (entry.sum == null) {
    text = '—';
    cls += ' unset';
  } else {
    text = fmtMetric(metric, entry.sum);
    if (entry.unsetCount > 0) cls += ' partial';
  }
  return '<span class="' + cls + '">' + escapeHtml(text) + '</span>';
}

function renderMetricGrid(metrics, bucket) {
  let html = '<div class="total-grid">';
  for (const m of metrics) {
    html += '<div class="row">'
      + '<span class="k">' + escapeHtml(m.label) + '</span>'
      + metricsBadgeHtml(m, bucket) + ' <span class="k" style="margin-left:4px">' + escapeHtml(m.unit) + '</span>'
      + '</div>';
  }
  html += '</div>';
  return html;
}

/* ======================================================================
 * 点滴タブ
 * ====================================================================== */
function renderIvPanel() {
  const panel = document.getElementById('panel-iv');
  const rec = getCurrentRecord();
  const compute = computeAll(rec);

  let html = '';
  html += '<div class="disclaimer"><strong>計算補助ツール</strong>：本ツールは投与推奨・処方提案を行いません。入力値と計算結果は必ず確認してください。</div>';
  html += '<div class="panel-toolbar">'
        + '<h2 class="panel-title">点滴</h2>'
        + '<div class="spacer"></div>'
        + '<button type="button" class="btn btn-primary btn-sm" data-action="iv-add">+ 行を追加</button>'
        + '</div>';

  if (rec.iv.length === 0) {
    html += '<div class="empty-state">点滴の行がありません。<div class="hint">「+ 行を追加」で入力を開始してください。</div></div>';
  } else {
    rec.iv.forEach((line, idx) => {
      html += renderIvLine(line, idx);
    });
  }

  // 点滴小計
  html += '<div class="section-sub">'
        + '<div class="section-sub-title">点滴小計</div>'
        + renderInlineMetrics(IV_METRICS, compute.iv)
        + renderCarbInsulinRatio(compute)
        + '</div>';

  panel.innerHTML = html;
}

function renderIvLine(line, idx) {
  const master = getMasterById('iv', line.masterId);
  const nut = lineNutrients('iv', line, false);
  const qty = (line.quantity != null) ? String(line.quantity) : '';

  let prodHtml;
  if (master) {
    prodHtml = '<button type="button" class="product-btn" data-action="iv-pick" data-line="' + line.id + '">'
             + '<span class="product-btn-name">' + escapeHtml(master.name) + '</span>'
             + '<span class="product-btn-chev">▾</span></button>';
  } else {
    prodHtml = '<button type="button" class="product-btn empty" data-action="iv-pick" data-line="' + line.id + '">'
             + '<span class="product-btn-name">製品を選択…</span>'
             + '<span class="product-btn-chev">▾</span></button>';
  }

  let subHtml = '';
  if (master && nut) {
    const parts = [];
    for (const m of IV_METRICS) {
      const v = nut[m.key];
      if (v == null || v === 0) continue;
      parts.push('<span><span class="m-label">' + escapeHtml(m.short) + '</span>' + fmtMetric(m, v) + '</span>');
    }
    if (parts.length === 0) parts.push('<span class="m-label">（値なし）</span>');
    subHtml = parts.join('');
  } else {
    subHtml = '<span class="m-label">製品未選択</span>';
  }

  return ''
    + '<div class="line-card" data-line="' + line.id + '">'
    +   '<div class="line-head">'

function renderInlineMetrics(metrics, bucket) {
  let html = '<div class="section-sub-grid">';
  for (const m of metrics) {
    html += '<div>'
         +  '<span class="k">' + escapeHtml(m.label) + '</span>'
         +  metricsBadgeHtml(m, bucket)
         +  ' <span class="k">' + escapeHtml(m.unit) + '</span>'
         + '</div>';
  }
  html += '</div>';
  const hasPartial = metrics.some((m) => {
    const e = bucket[m.key];
    return e && e.unsetCount > 0 && e.sum != null;
  });
  if (hasPartial) {
    html += '<div class="section-sub-note">* 一部の栄養値がマスタで未設定です（合計から除外）</div>';
  }
  return html;
}

function renderCarbInsulinRatio(compute) {
  const ins = compute.ivInsulinSum;
  let display;
  if (ins == null || ins === 0) {
    display = '—';
  } else {
    const r = compute.carbInsulinRatio;
    display = (r == null) ? '—' : (Math.round(r * 10) / 10).toFixed(1) + ' g/単位';
  }
  const insDisplay = (ins == null) ? '0' : fmtMetric(INSULIN_METRIC, ins);
  return '<div class="section-sub-grid" style="margin-top:6px;border-top:1px dashed #bfdbfe;padding-top:6px">'
       + '<div><span class="k">混注インスリン総単位</span><span class="v num">' + escapeHtml(insDisplay) + '</span> <span class="k">単位</span></div>'
       + '<div><span class="k">糖質／インスリン比</span><span class="v num">' + escapeHtml(display) + '</span></div>'
       + '</div>';
}

/* 食事・ONSの行共通 */
function renderMealOrOnsLine(type, line, idx) {
  const master = getMasterById(type, line.masterId);

  const qty = (line.quantity != null) ? String(line.quantity) : '';
  const ratio = (line.ratio != null) ? line.ratio : 10;

  let prodHtml;
  if (master) {
    prodHtml = '<button type="button" class="product-btn" data-action="' + type + '-pick" data-line="' + line.id + '">'
             + '<span class="product-btn-name">' + escapeHtml(master.name) + '</span>'
             + '<span class="product-btn-chev">▾</span></button>';
  } else {
    prodHtml = '<button type="button" class="product-btn empty" data-action="' + type + '-pick" data-line="' + line.id + '">'
             + '<span class="product-btn-name">製品を選択…</span>'
             + '<span class="product-btn-chev">▾</span></button>';
  }

  // 摂取割合ボタン
  let ratioBtns = '<div class="ratio-buttons">';
  for (let i = 0; i <= 10; i++) {

      parts.push('<span><span class="m-label">' + escapeHtml(m.short) + '</span>' + fmtMetric(m, v) + '</span>');
    }
    if (parts.length === 0) parts.push('<span class="m-label">（値なし）</span>');
    subHtml = parts.join('');
  } else {
    subHtml = '<span class="m-label">製品未選択</span>';

  return ''
    + '<div class="line-card" data-line="' + line.id + '">'
    +   '<div class="line-head">'
    +     '<span class="line-index">' + (idx + 1) + '</span>'
    +     prodHtml

    +     '<input type="text" inputmode="decimal" class="qty-input num" data-action="' + type + '-qty" data-line="' + line.id + '" value="' + escapeHtml(qty) + '" aria-label="数量">'
    +     '<span class="qty-unit">' + escapeHtml(master ? master.unitName : '単位') + '</span>'
    +     '<input type="text" class="memo-input" data-action="' + type + '-memo" data-line="' + line.id + '" placeholder="メモ" value="' + escapeHtml(line.memo || '') + '">'
    +   '</div>'
    +   '<div class="ratio-wrap">'
    +     '<div class="ratio-label">摂取割合: <span class="ratio-selected">' + ratio + '割</span>（' + (ratio * 10) + '%）</div>'
    +     ratioBtns

    +       '<input type="text" inputmode="decimal" data-action="' + type + '-ratio-custom" data-line="' + line.id + '" value="' + escapeHtml(String(ratio)) + '" class="num">'

function renderMastersPanel() {
  const panel = document.getElementById('panel-masters');
  const type = state.ui.activeMasterType;

  const sort = state.ui.masterSort;

  let html = '';
  html += '<div class="panel-toolbar">'
       + '<h2 class="panel-title">マスタ管理</h2>'
       + '<div class="spacer"></div>'
       + '<button type="button" class="btn btn-sm" data-action="master-export-json">JSON書出</button>'
       + '<button type="button" class="btn btn-sm" data-action="master-export-csv">CSV書出</button>'
       + '<button type="button" class="btn btn-sm" data-action="master-import">読込</button>'
       + '</div>';

  // タイプ切替
  html += '<div class="master-type-tabs">';
  const types = [
    { k: 'iv', l: '点滴マスタ' },
    { k: 'meal', l: '食事マスタ' },
    { k: 'ons', l: 'ONSマスタ' }
  ];
  for (const t of types) {
    html += '<button type="button" class="master-type-tab' + (type === t.k ? ' active' : '') + '" data-action="master-type" data-type="' + t.k + '">' + escapeHtml(t.l) + '</button>';
  }
  html += '</div>';

  // 検索
  html += '<input type="search" class="master-search" id="master-search-input" placeholder="名前・分類・メモで検索" value="' + escapeHtml(state.ui.masterSearch) + '" autocomplete="off">';

  // 並べ替え + 追加
  html += '<div class="master-sort">'
       + '並べ替え: '
       + '<select data-action="master-sort">'
       +   '<option value="name"' + (sort === 'name' ? ' selected' : '') + '>名前順</option>'
       +   '<option value="category"' + (sort === 'category' ? ' selected' : '') + '>分類順</option>'
       +   '<option value="favorite"' + (sort === 'favorite' ? ' selected' : '') + '>お気に入り優先</option>'
       + '</select>'
       + '<div class="spacer" style="flex:1"></div>'
       + '<button type="button" class="btn btn-primary btn-sm" data-action="master-add">+ 追加</button>'
       + '</div>';

  // 一覧
  let list = state.masters[type].slice();
  if (search) {
    list = list.filter((m) => {
      return (m.name || '').toLowerCase().includes(search)
          || (m.category || '').toLowerCase().includes(search)
          || (m.memo || '').toLowerCase().includes(search);
    });
  }
  list.sort((a, b) => {
    if (sort === 'favorite') {
      if (a.favorite !== b.favorite) return a.favorite ? -1 : 1;
      return (a.name || '').localeCompare(b.name || '', 'ja');
    } else if (sort === 'category') {
      const c = (a.category || '').localeCompare(b.category || '', 'ja');
      if (c !== 0) return c;
      return (a.name || '').localeCompare(b.name || '', 'ja');
    } else {
      return (a.name || '').localeCompare(b.name || '', 'ja');
    }
  });

  if (list.length === 0) {
    html += '<div class="empty-state">該当するマスタがありません。<div class="hint">「+ 追加」で新規登録してください。</div></div>';
  } else {
    for (const m of list) {
      html += renderMasterItem(type, m);
    }
  }

  panel.innerHTML = html;

  // 検索欄の保持
  const si = document.getElementById('master-search-input');
  if (si) {
    si.addEventListener('input', (e) => {
      state.ui.masterSearch = e.target.value;
      renderMastersPanel();
      const s = document.getElementById('master-search-input');
      if (s) { s.focus(); try { s.setSelectionRange(s.value.length, s.value.length); } catch(_){} }
    });
  }
}

function renderMasterItem(type, m) {
  const keys = (type === 'iv') ? IV_METRICS : METRICS;
  const parts = [];
  for (const mk of keys) {
    const v = m.nutrients[mk.key];
    if (v == null || v === 0) continue;
    parts.push('<span><span class="nu">' + escapeHtml(mk.short) + '</span> ' + v + escapeHtml(mk.unit) + '</span>');
  }
  const nutriStr = parts.length ? parts.join(' ') : '<span class="nu">（栄養値未設定）</span>';

  return ''
    + '<div class="master-item">'
    +   '<div class="master-item-body">'
    +     '<div class="master-name">' + (m.favorite ? '<span class="star">★</span>' : '') + escapeHtml(m.name) + '</div>'
    +     '<div class="master-cat">' + escapeHtml(m.category || '—') + ' / ' + escapeHtml(m.unitName) + '</div>'
    +     '<div class="master-nutri num">' + nutriStr + '</div>'
    +     (m.memo ? '<div class="master-cat" style="margin-top:2px">📝 ' + escapeHtml(m.memo) + '</div>' : '')
    +   '</div>'
    +   '<div class="master-item-actions">'
    +     '<button type="button" class="btn-icon" data-action="master-fav" data-id="' + m.id + '">' + (m.favorite ? '★' : '☆') + '</button>'
    +     '<button type="button" class="btn-icon" data-action="master-edit" data-id="' + m.id + '">編集</button>'
    +     '<button type="button" class="btn-icon" data-action="master-del" data-id="' + m.id + '">🗑</button>'
    +   '</div>'
    + '</div>';
}

function formatTime(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  const z = (n) => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + z(d.getMonth()+1) + '-' + z(d.getDate())
       + ' ' + z(d.getHours()) + ':' + z(d.getMinutes());
}

/* ======================================================================
 * 固定サマリー
 * ====================================================================== */
function renderSummary() {
  const bar = document.getElementById('summary-bar');
  const rec = getCurrentRecord();
  const compute = computeAll(rec);

  // grand は共通9指標、insulin は点滴から
  const itemsHtml = SUMMARY_KEYS.map((k) => {
    let metric, bucket;
    if (k === 'insulin') {
      metric = INSULIN_METRIC;
      bucket = compute.iv;
    } else {
      metric = METRICS.find((m) => m.key === k);
      bucket = compute.grand;
    }
    const e = bucket[metric.key] || { sum: null, unsetCount: 0 };
    let cls = 'v num', text;
    if (e.sum == null && e.unsetCount === 0) { text = '0'; }
    else if (e.sum == null)                  { text = '—'; cls += ' unset'; }
    else {
      text = fmtMetric(metric, e.sum);
      if (e.unsetCount > 0) cls += ' partial';
    }
    return '<div class="summary-item"><span class="k">' + escapeHtml(metric.short) + '</span><span class="' + cls + '">' + escapeHtml(text) + '<span style="font-size:10px;color:#94a3b8;margin-left:2px">' + escapeHtml(metric.unit) + '</span></span></div>';
  }).join('');

  // 糖質/インスリン比
  let ratioText;
  if (compute.ivInsulinSum == null || compute.ivInsulinSum === 0) ratioText = '—';
  else ratioText = (Math.round(compute.carbInsulinRatio * 10) / 10).toFixed(1);

  bar.innerHTML = ''
    + '<div class="summary-title"><span>1日合計（サマリー）</span><span class="num" style="color:#fbbf24">糖/I比: ' + escapeHtml(ratioText) + '</span></div>'
    + '<div class="summary-grid">' + itemsHtml + '</div>';
}

/* ======================================================================

let pickerContext = null; // { type, lineId, slot? }

function openPicker(type, lineId) {
  pickerContext = { type: type, lineId: lineId };
  state.ui.pickerSearch = '';
  state.ui.pickerCategory = '';

    (type === 'iv' ? '点滴' : type === 'meal' ? '食事' : 'ONS') + ' 製品を選択';

  document.getElementById('picker-overlay').hidden = true;

function renderPicker() {
  if (!pickerContext) return;
  const type = pickerContext.type;
  const search = state.ui.pickerSearch.trim().toLowerCase();
  const cat = state.ui.pickerCategory;
  const recent = state.recentProductUse[type] || {};

  let list = state.masters[type].slice();

  // カテゴリ候補
  const cats = Array.from(new Set(list.map((m) => m.category).filter(Boolean)));
  cats.sort((a, b) => a.localeCompare(b, 'ja'));

  const filtersEl = document.getElementById('picker-filters');
  let filterHtml = '<button type="button" class="chip' + (cat === '' ? ' active' : '') + '" data-picker-cat="">全て</button>';
  for (const c of cats) {
    filterHtml += '<button type="button" class="chip' + (cat === c ? ' active' : '') + '" data-picker-cat="' + escapeHtml(c) + '">' + escapeHtml(c) + '</button>';
  }
  filtersEl.innerHTML = filterHtml;

  if (cat) list = list.filter((m) => m.category === cat);
  if (search) list = list.filter((m) => {
    return (m.name || '').toLowerCase().includes(search)
        || (m.category || '').toLowerCase().includes(search)
        || (m.memo || '').toLowerCase().includes(search);
  });

  // お気に入り > 最近使用 > 名前順
  list.sort((a, b) => {
    if (a.favorite !== b.favorite) return a.favorite ? -1 : 1;
    const ra = recent[a.id] || 0;
    const rb = recent[b.id] || 0;
    if (ra !== rb) return rb - ra;
    return (a.name || '').localeCompare(b.name || '', 'ja');
  });

  const listEl = document.getElementById('picker-list');
  if (list.length === 0) {
    listEl.innerHTML = '<div class="picker-empty">該当する製品がありません。<br>「マスタ」タブで追加できます。</div>';
    return;
  }
  const keys = (type === 'iv') ? IV_METRICS : METRICS;
  listEl.innerHTML = list.map((m) => {
    const parts = [];
    for (const mk of keys) {
      const v = m.nutrients[mk.key];
      if (v == null || v === 0) continue;
      parts.push(escapeHtml(mk.short) + ' ' + v + escapeHtml(mk.unit));
    }
    return '<button type="button" class="picker-item" data-picker-pick="' + m.id + '">'
         + '<div class="picker-item-body">'
         +   '<div class="pname">' + (m.favorite ? '<span class="star">★</span>' : '') + escapeHtml(m.name) + '</div>'
         +   '<div class="pcat">' + escapeHtml(m.category || '—') + ' / ' + escapeHtml(m.unitName) + '</div>'
         +   '<div class="pnutri">' + (parts.length ? parts.join(' ・ ') : '<span style="color:var(--text-muted)">（値なし）</span>') + '</div>'
         + '</div>'
         + '</button>';
  }).join('');
}

function pickProduct(masterId) {
  if (!pickerContext) return;
  const { type, lineId } = pickerContext;
  const rec = getCurrentRecord();
  let line = null;
  if (type === 'iv') line = rec.iv.find((l) => l.id === lineId);
  else if (type === 'ons') line = rec.ons.find((l) => l.id === lineId);
  else {
    for (const slot of MEAL_SLOTS) {
      line = rec.meal[slot.key].find((l) => l.id === lineId);
      if (line) break;
    }
  }
  if (line) {
    line.masterId = masterId;
    trackProductUse(type, masterId);
    touchRecord();
  }
  closePicker();
  render();
}

  const favorite = document.getElementById('mf-fav').checked;
  const keys = (type === 'iv') ? IV_METRICS : METRICS;

    const raw = document.getElementById('mf-nu-' + mk.key).value.trim();
    nutrients[mk.key] = (raw === '') ? null : (parseNum(raw));
  }
  if (!id) {

    m.favorite = favorite;
    state.masters[type].push(m);

    m.category = category;
    m.unitName = unitName;
    m.memo = memo;
    m.favorite = favorite;

    m.nutrients = Object.assign({}, m.nutrients, nutrients);
  }
  saveState();
  closeMasterEdit();

function newRecord() {
  const r = createRecord('', todayStr());
  state.records[r.id] = r;
  state.currentRecordId = r.id;
  saveState();
  showToast('新規記録を作成しました');
}
function loadRecord(id) {
  if (!state.records[id]) return;
  state.currentRecordId = id;
  saveState();
  showToast('記録を読み込みました');
}
function duplicateRecord(id) {
  const src = state.records[id];
  if (!src) return;
  const copy = deepClone(src);
  copy.id = genId('rec');
  copy.name = (src.name || '') + '（複製）';
  copy.date = todayStr();
  copy.createdAt = Date.now();
  copy.updatedAt = Date.now();
  // 行IDを振りなおす
  for (const l of copy.iv) l.id = genId('ln');
  for (const slot of MEAL_SLOTS) for (const l of copy.meal[slot.key]) l.id = genId('ln');
  for (const l of copy.ons) l.id = genId('ln');
  state.records[copy.id] = copy;
  state.currentRecordId = copy.id;
  saveState();
  showToast('複製しました');
}
function deleteRecord(id) {
  if (!state.records[id]) return;
  delete state.records[id];
  if (state.currentRecordId === id) {
    const remaining = Object.keys(state.records);
    if (remaining.length > 0) {
      state.currentRecordId = remaining[0];
    } else {
      const r = createRecord('', todayStr());
      state.records[r.id] = r;
      state.currentRecordId = r.id;
    }
  }
  saveState();
  showToast('削除しました');
}
function copyFromYesterday() {
  const cur = getCurrentRecord();
  // 現在の日付の1日前と日付一致する記録を探す（無ければ直近の別記録）
  const curDate = new Date(cur.date);
  curDate.setDate(curDate.getDate() - 1);
  const y = curDate.getFullYear() + '-' + String(curDate.getMonth() + 1).padStart(2, '0') + '-' + String(curDate.getDate()).padStart(2, '0');
  const candidates = Object.values(state.records)
    .filter((r) => r.id !== cur.id && r.date === y);
  let src = candidates.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0))[0];
  if (!src) {
    // 直近のもう1つを fallback
    const others = Object.values(state.records).filter((r) => r.id !== cur.id).sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
    if (others.length === 0) { showToast('複製元の記録が見つかりません'); return; }
    src = others[0];
    showToast('前日データがないため、直近の記録を複製しました');
  } else {
    showToast('前日データを複製しました');
  }
  cur.iv = deepClone(src.iv).map((l) => { l.id = genId('ln'); return l; });
  cur.ons = deepClone(src.ons).map((l) => { l.id = genId('ln'); return l; });
  for (const slot of MEAL_SLOTS) {
    cur.meal[slot.key] = deepClone(src.meal[slot.key] || []).map((l) => { l.id = genId('ln'); return l; });
  }
  touchRecord();
}

function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

/* ======================================================================
 * サマリーコピー
 * ====================================================================== */
function buildSummaryText() {
  const rec = getCurrentRecord();
  const c = computeAll(rec);
  const lines = [];
  lines.push('【栄養サマリー】 ' + rec.date + ' ' + (rec.name || ''));

  function row(label, bucket, metrics, extra) {
    const parts = [];
    for (const m of metrics) {
      const e = bucket[m.key] || { sum: null, unsetCount: 0 };
      let text;
      if (e.sum == null && e.unsetCount === 0) text = '0';
      else if (e.sum == null) text = '—';
      else {
        text = fmtMetric(m, e.sum);
        if (e.unsetCount > 0) text += '*';
      }
      parts.push(m.short + ' ' + text + m.unit);
    }
    let line = label + ': ' + parts.join(' / ');
    if (extra) line += ' / ' + extra;
    return line;
  }

  // 点滴
  const insText = (c.ivInsulinSum == null || c.ivInsulinSum === 0) ? '—' : fmtMetric(INSULIN_METRIC, c.ivInsulinSum);
  const ratioText = (c.ivInsulinSum == null || c.ivInsulinSum === 0) ? '—' : (Math.round(c.carbInsulinRatio * 10) / 10).toFixed(1) + 'g/単位';
  lines.push(row('点滴', c.iv, METRICS, 'Ins ' + insText + '単位 / 糖/I比 ' + ratioText));

  // 食事
  lines.push(row('食事', c.meal, METRICS));
  // ONS
  lines.push(row('ONS',  c.ons,  METRICS));
  // 合計
  lines.push(row('合計', c.grand, METRICS));

  lines.push('※*は一部栄養値未設定（合計から除外）');
  lines.push('※本ツールは計算補助。実値は処方・指示箋で確認してください。');
  return lines.join('\n');
}
async function copySummary() {
  const text = buildSummaryText();
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    showToast('サマリーをコピーしました');
  } catch (e) {
    // フォールバックで全文をダイアログ表示
    const ok = window.prompt('コピーに失敗しました。下記をコピーしてください:', text);
    if (ok !== null) showToast('テキストをご確認ください');
  }
}

function exportMastersJSON() {

    masters: state.masters,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });

function exportMastersCSV() {
  const rows = [];
  const header = ['type','id','name','category','unitName','favorite','memo'];
  for (const mk of IV_METRICS) header.push('n_' + mk.key);
  rows.push(header);
  const all = [];
  for (const t of ['iv','meal','ons']) {
    for (const m of state.masters[t]) {
      const row = [t, m.id, m.name, m.category || '', m.unitName || '', m.favorite ? '1' : '0', m.memo || ''];
      for (const mk of IV_METRICS) {
        const v = m.nutrients[mk.key];
        row.push(v == null ? '' : v);
      }
      rows.push(row);
    }
  }
  const csv = rows.map((r) => r.map(csvCell).join(',')).join('\r\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  triggerDownload(blob, 'nutri-masters-' + todayStr() + '.csv');
}
function csvCell(v) {
  if (v == null) return '';
  const s = String(v);
  if (/[",\r\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}
function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 500);
}

function importMastersFromFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    try {
      if (file.name.toLowerCase().endsWith('.csv')) {
        const parsed = parseCSV(text);
        importMastersFromRows(parsed);
      } else {
        const obj = JSON.parse(text);
        importMastersFromObject(obj);
      }
      saveState();
      render();
      showToast('マスタを読み込みました');
    } catch (err) {
      console.warn(err);
      showToast('読み込みに失敗: ' + (err.message || err));
    }
  };
  reader.readAsText(file, 'utf-8');
}
function importMastersFromObject(obj) {
  if (!obj || !obj.masters) throw new Error('形式が不正です');
  // merge: 同一 id は置換、新 id は追加
  for (const t of ['iv','meal','ons']) {
    if (!Array.isArray(obj.masters[t])) continue;
    for (const m of obj.masters[t]) {
      if (!m || !m.name) continue;
      const normalized = normalizeImportedMaster(t, m);
      const idx = state.masters[t].findIndex((x) => x.id === normalized.id);
      if (idx >= 0) state.masters[t][idx] = normalized;
      else state.masters[t].push(normalized);
    }
  }
}
function normalizeImportedMaster(type, m) {
  const base = buildMaster(type, m.name || '', m.category || '', m.unitName || '1単位', {}, m.memo || '');
  if (m.id) base.id = m.id;
  base.favorite = !!m.favorite;
  const keys = (type === 'iv') ? IV_METRICS.map((mk) => mk.key) : METRICS.map((mk) => mk.key);
  if (m.nutrients) {
    for (const k of keys) {
      const v = m.nutrients[k];
      base.nutrients[k] = (v == null || v === '' || Number.isNaN(Number(v))) ? null : Number(v);
    }
  }
  return base;
}
function importMastersFromRows(rows) {
  if (rows.length < 2) throw new Error('CSVが空です');
  const header = rows[0].map((h) => h.trim());
  const idx = {};
  header.forEach((h, i) => { idx[h] = i; });
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (row.every((c) => !c)) continue;
    const type = (row[idx.type] || '').trim();
    if (!['iv','meal','ons'].includes(type)) continue;
    const obj = {
      id: row[idx.id] || undefined,
      name: row[idx.name] || '',
      category: row[idx.category] || '',
      unitName: row[idx.unitName] || '1単位',
      favorite: row[idx.favorite] === '1' || row[idx.favorite] === 'true',
      memo: row[idx.memo] || '',
      nutrients: {},
    };
    for (const mk of IV_METRICS) {
      const col = 'n_' + mk.key;
      if (idx[col] != null) {
        const v = row[idx[col]];
        obj.nutrients[mk.key] = (v == null || v === '') ? null : Number(v);
      }
    }
    if (!obj.name) continue;
    const normalized = normalizeImportedMaster(type, obj);
    const existing = state.masters[type].findIndex((x) => x.id === normalized.id);
    if (existing >= 0) state.masters[type][existing] = normalized;
    else state.masters[type].push(normalized);
  }
}
// シンプルなCSVパーサ
function parseCSV(text) {
  const rows = [];
  let cur = [];
  let field = '';
  let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else inQ = false;
      } else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { cur.push(field); field = ''; }
      else if (c === '\r') { /* skip */ }
      else if (c === '\n') { cur.push(field); rows.push(cur); cur = []; field = ''; }
      else field += c;
    }
  }
  if (field.length > 0 || cur.length > 0) { cur.push(field); rows.push(cur); }
  return rows;
}

/* ======================================================================

 * ====================================================================== */
function setupEvents() {
  // タブ切替
  document.getElementById('main-tabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    state.ui.activeTab = btn.dataset.tab;
    render();
  });

  // 現在記録ボタン
  document.getElementById('current-record-btn').addEventListener('click', openRecordModal);
  document.getElementById('record-close').addEventListener('click', closeRecordModal);

  // ピッカー
  document.getElementById('picker-close').addEventListener('click', closePicker);
  document.getElementById('picker-overlay').addEventListener('click', (e) => {
    if (e.target.id === 'picker-overlay') closePicker();
  });
  document.getElementById('picker-search').addEventListener('input', (e) => {
    state.ui.pickerSearch = e.target.value;
    renderPicker();
  });
  document.getElementById('picker-filters').addEventListener('click', (e) => {
    const chip = e.target.closest('[data-picker-cat]');
    if (!chip) return;
    state.ui.pickerCategory = chip.dataset.pickerCat;
    renderPicker();
  });
  document.getElementById('picker-list').addEventListener('click', (e) => {
    const b = e.target.closest('[data-picker-pick]');
    if (!b) return;
    pickProduct(b.dataset.pickerPick);
  });

  // マスタ編集モーダル
  document.getElementById('master-close').addEventListener('click', closeMasterEdit);
  document.getElementById('master-cancel').addEventListener('click', closeMasterEdit);
  document.getElementById('master-save').addEventListener('click', saveMasterEdit);
  document.getElementById('master-overlay').addEventListener('click', (e) => {
    if (e.target.id === 'master-overlay') closeMasterEdit();
  });

  // 確認モーダル
  document.getElementById('confirm-cancel').addEventListener('click', closeConfirm);
  document.getElementById('confirm-ok').addEventListener('click', () => {
    const cb = confirmCallback;
    closeConfirm();
    if (cb) cb();
  });

  // ファイル入力
  document.getElementById('file-input').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f) importMastersFromFile(f);
    e.target.value = '';
  });

  // グローバル委譲：タップ（click）
  document.body.addEventListener('click', handleGlobalClick);
  // 入力系（change, input）
  document.body.addEventListener('change', handleGlobalChange);
  document.body.addEventListener('input', handleGlobalInput);
}

function handleGlobalClick(e) {
  const t = e.target.closest('[data-action]');
  if (!t) return;
  const action = t.dataset.action;
  const rec = getCurrentRecord();

  // 点滴
  if (action === 'iv-add') {
    rec.iv.push(newIvLine());
    touchRecord();
    render();
  } else if (action === 'iv-pick') {
    openPicker('iv', t.dataset.line);
  } else if (action === 'iv-del') {
    showConfirm('削除の確認', 'この点滴の行を削除します。よろしいですか？', () => {
      rec.iv = rec.iv.filter((l) => l.id !== t.dataset.line);
      touchRecord();
      render();
    });
  } else if (action === 'iv-dup') {
    const src = rec.iv.find((l) => l.id === t.dataset.line);
    if (src) {
      const copy = deepClone(src);
      copy.id = genId('ln');
      const idx = rec.iv.indexOf(src);
      rec.iv.splice(idx + 1, 0, copy);
      touchRecord();
      render();
    }
  }
  // 食事スロット切替
  else if (action === 'meal-slot') {
    state.ui.activeMealSlot = t.dataset.slot;
    render();
  }
  // 食事
  else if (action === 'meal-add') {
    rec.meal[state.ui.activeMealSlot].push(newMealLine());
    touchRecord();
    render();
  } else if (action === 'meal-pick') {
    openPicker('meal', t.dataset.line);
  } else if (action === 'meal-del') {
    showConfirm('削除の確認', 'この食事の行を削除します。よろしいですか？', () => {
      for (const slot of MEAL_SLOTS) {
        rec.meal[slot.key] = rec.meal[slot.key].filter((l) => l.id !== t.dataset.line);
      }
      touchRecord();
      render();
    });
  } else if (action === 'meal-dup') {
    for (const slot of MEAL_SLOTS) {
      const src = rec.meal[slot.key].find((l) => l.id === t.dataset.line);
      if (src) {
        const copy = deepClone(src);
        copy.id = genId('ln');
        const idx = rec.meal[slot.key].indexOf(src);
        rec.meal[slot.key].splice(idx + 1, 0, copy);
        touchRecord();
        render();
        break;
      }
    }
  } else if (action === 'meal-ratio') {
    applyRatio('meal', t.dataset.line, Number(t.dataset.val));
  }
  // ONS
  else if (action === 'ons-add') {
    rec.ons.push(newOnsLine());
    touchRecord();
    render();
  } else if (action === 'ons-pick') {
    openPicker('ons', t.dataset.line);
  } else if (action === 'ons-del') {
    showConfirm('削除の確認', 'このONSの行を削除します。よろしいですか？', () => {
      rec.ons = rec.ons.filter((l) => l.id !== t.dataset.line);
      touchRecord();
      render();
    });
  } else if (action === 'ons-dup') {
    const src = rec.ons.find((l) => l.id === t.dataset.line);
    if (src) {
      const copy = deepClone(src);
      copy.id = genId('ln');
      const idx = rec.ons.indexOf(src);
      rec.ons.splice(idx + 1, 0, copy);
      touchRecord();
      render();
    }
  } else if (action === 'ons-ratio') {
    applyRatio('ons', t.dataset.line, Number(t.dataset.val));
  }
  // サマリーコピー
  else if (action === 'copy-summary') {
    copySummary();
  }
  // マスタ
  else if (action === 'master-type') {
    state.ui.activeMasterType = t.dataset.type;
    state.ui.masterSearch = '';
    renderMastersPanel();
  } else if (action === 'master-add') {
    openMasterEdit(state.ui.activeMasterType, null);
  } else if (action === 'master-edit') {
    openMasterEdit(state.ui.activeMasterType, t.dataset.id);
  } else if (action === 'master-del') {
    const m = getMasterById(state.ui.activeMasterType, t.dataset.id);
    if (!m) return;
    showConfirm('削除の確認', '「' + m.name + '」をマスタから削除します。既存の記録で選択済みの場合、その行は製品未選択になります。よろしいですか？', () => {
      const type = state.ui.activeMasterType;
      state.masters[type] = state.masters[type].filter((x) => x.id !== t.dataset.id);
      // 既存記録での参照をクリア
      for (const id of Object.keys(state.records)) {
        const r = state.records[id];
        if (type === 'iv') r.iv.forEach((l) => { if (l.masterId === t.dataset.id) l.masterId = null; });
        if (type === 'ons') r.ons.forEach((l) => { if (l.masterId === t.dataset.id) l.masterId = null; });
        if (type === 'meal') for (const s of MEAL_SLOTS) r.meal[s.key].forEach((l) => { if (l.masterId === t.dataset.id) l.masterId = null; });
      }
      saveState();
      render();
      showToast('削除しました');
    });
  } else if (action === 'master-fav') {
    const m = getMasterById(state.ui.activeMasterType, t.dataset.id);
    if (m) { m.favorite = !m.favorite; saveState(); renderMastersPanel(); }
  } else if (action === 'master-export-json') {
    exportMastersJSON();
  } else if (action === 'master-export-csv') {
    exportMastersCSV();
  } else if (action === 'master-import') {
    document.getElementById('file-input').click();
  }
  // 記録
  else if (action === 'record-new' || action === 'record-new-modal') {
    newRecord();
    closeRecordModal();
    render();
  } else if (action === 'record-load' || action === 'record-load-modal') {
    loadRecord(t.dataset.id);
    closeRecordModal();
    render();
  } else if (action === 'record-duplicate') {
    duplicateRecord(t.dataset.id);
    closeRecordModal();
    render();
  } else if (action === 'record-delete') {
    const r = state.records[t.dataset.id];
    if (!r) return;
    showConfirm('削除の確認', '「' + (r.name || '無名') + '（' + r.date + '）」を削除します。元に戻せません。よろしいですか？', () => {
      deleteRecord(t.dataset.id);
      render();
      if (!document.getElementById('record-overlay').hidden) renderRecordModal();
    });
  } else if (action === 'record-copy-yesterday' || action === 'record-copy-yesterday-modal') {
    copyFromYesterday();
    closeRecordModal();
    render();
  }
}

function applyRatio(type, lineId, val) {
  const rec = getCurrentRecord();
  let line = null;
  if (type === 'ons') line = rec.ons.find((l) => l.id === lineId);
  else {
    for (const s of MEAL_SLOTS) {
      line = rec.meal[s.key].find((l) => l.id === lineId);
      if (line) break;
    }
  }
  if (!line) return;
  line.ratio = val;
  touchRecord();
  render();
}

function handleGlobalChange(e) {
  const t = e.target;
  if (!t.dataset || !t.dataset.action) return;
  const action = t.dataset.action;
  const rec = getCurrentRecord();
  if (action === 'rec-date') {
    rec.date = t.value;
    touchRecord();
    // ヘッダー更新
    document.getElementById('current-record-name').textContent = renderCurrentRecordLabel();
  } else if (action === 'master-sort') {
    state.ui.masterSort = t.value;
    renderMastersPanel();
  }
}
function handleGlobalInput(e) {
  const t = e.target;
  if (!t.dataset || !t.dataset.action) return;
  const action = t.dataset.action;
  const rec = getCurrentRecord();
  const lineId = t.dataset.line;

  if (action === 'iv-qty') {
    const line = rec.iv.find((l) => l.id === lineId);
    if (line) { line.quantity = parseNum(t.value); touchRecord(); renderSummary(); updateSectionSubtotalLive(); }
  } else if (action === 'iv-memo') {
    const line = rec.iv.find((l) => l.id === lineId);
    if (line) { line.memo = t.value; touchRecord(); }
  } else if (action === 'meal-qty' || action === 'meal-memo' || action === 'meal-ratio-custom') {
    let line = null;
    for (const s of MEAL_SLOTS) { line = rec.meal[s.key].find((l) => l.id === lineId); if (line) break; }
    if (line) {
      if (action === 'meal-qty') { line.quantity = parseNum(t.value); }
      else if (action === 'meal-memo') { line.memo = t.value; }
      else if (action === 'meal-ratio-custom') {
        const n = parseNum(t.value);
        line.ratio = (n == null) ? 10 : Math.max(0, Math.min(10, n));
      }
      touchRecord();
      renderSummary();
      updateSectionSubtotalLive();
    }
  } else if (action === 'ons-qty' || action === 'ons-memo' || action === 'ons-ratio-custom') {
    const line = rec.ons.find((l) => l.id === lineId);
    if (line) {
      if (action === 'ons-qty') { line.quantity = parseNum(t.value); }
      else if (action === 'ons-memo') { line.memo = t.value; }
      else if (action === 'ons-ratio-custom') {
        const n = parseNum(t.value);
        line.ratio = (n == null) ? 10 : Math.max(0, Math.min(10, n));
      }
      touchRecord();
      renderSummary();
      updateSectionSubtotalLive();
    }
  } else if (action === 'rec-name') {
    rec.name = t.value;
    touchRecord();
    document.getElementById('current-record-name').textContent = renderCurrentRecordLabel();
  }
}

// 入力中に小計セクションだけ更新（入力欄の focus を壊さない）
function updateSectionSubtotalLive() {
  // 現在のタブを再描画（入力欄以外）
  // 簡便化のため、小計部分だけ更新するのではなく、行の小計と、各セクションの小計を再構築
  // ただしアクティブな input の値を保持するため、入力欄自体は再描画せず、派生表示のみ更新
  const tab = state.ui.activeTab;
  if (tab !== 'iv' && tab !== 'meal' && tab !== 'ons') return;
  const panel = document.getElementById('panel-' + tab);
  if (!panel) return;
  const rec = getCurrentRecord();
  const compute = computeAll(rec);

  // 各 .line-card 内の .line-sub-metrics を更新
  panel.querySelectorAll('.line-card').forEach((card) => {
    const lineId = card.dataset.line;
    let line = null;
    let type = tab;
    if (tab === 'iv') line = rec.iv.find((l) => l.id === lineId);
    else if (tab === 'ons') line = rec.ons.find((l) => l.id === lineId);
    else {
      for (const s of MEAL_SLOTS) { line = rec.meal[s.key].find((l) => l.id === lineId); if (line) break; }
    }
    if (!line) return;
    const master = getMasterById(type, line.masterId);
    const useRatio = (type !== 'iv');
    const nut = lineNutrients(type, line, useRatio);
    const keys = (type === 'iv') ? IV_METRICS : METRICS;
    const parts = [];
    if (master && nut) {
      for (const mk of keys) {
        const v = nut[mk.key];
        if (v == null || v === 0) continue;
        parts.push('<span><span class="m-label">' + escapeHtml(mk.short) + '</span>' + fmtMetric(mk, v) + '</span>');
      }
      if (parts.length === 0) parts.push('<span class="m-label">（値なし）</span>');
    } else {
      parts.push('<span class="m-label">製品未選択</span>');
    }
    const sub = card.querySelector('.line-sub-metrics');
    if (sub) sub.innerHTML = parts.join('');
    // 単位表示も更新
    const unitSpan = card.querySelector('.qty-unit');
    if (unitSpan && master) unitSpan.textContent = master.unitName;

    // ratio 表示
    const rs = card.querySelector('.ratio-selected');
    if (rs && line.ratio != null) rs.textContent = line.ratio + '割';
    card.querySelectorAll('.ratio-btn').forEach((b) => {
      b.classList.toggle('active', Number(b.dataset.val) === line.ratio);
    });
  });

  // セクション小計を差し替え
  // iv
  if (tab === 'iv') {
    const sec = panel.querySelector('.section-sub');
    if (sec) {
      sec.innerHTML = '<div class="section-sub-title">点滴小計</div>'
        + renderInlineMetrics(IV_METRICS, compute.iv)
        + renderCarbInsulinRatio(compute);
    }
  } else if (tab === 'ons') {
    const sec = panel.querySelector('.section-sub');
    if (sec) {
      sec.innerHTML = '<div class="section-sub-title">ONS小計</div>'
        + renderInlineMetrics(METRICS, compute.ons);
    }
  } else if (tab === 'meal') {
    const slot = state.ui.activeMealSlot;
    const slotBucket = compute.mealPerSlot[slot].bucket;
    const secs = panel.querySelectorAll('.section-sub');
    if (secs[0]) {
      secs[0].innerHTML = '<div class="section-sub-title">' + escapeHtml(MEAL_SLOTS.find((s) => s.key === slot).label) + '小計</div>'
        + renderInlineMetrics(METRICS, slotBucket);
    }
    if (secs[1]) {
      secs[1].innerHTML = '<div class="section-sub-title">食事合計（朝＋昼＋夕＋間食）</div>'
        + renderInlineMetrics(METRICS, compute.meal);
    }
  }
}

/* ======================================================================
 * 期待値テスト（コンソール出力）
 * ====================================================================== */
function runExpectedValueTest() {
  // プロンプト記載の期待値を検証
  // 現在のマスタを前提に、仮の記録を作って計算する（永続化はしない）
  try {
    const ivA  = state.masters.iv.find((m) => m.name === '点滴サンプルA（仮データ）');
    const insS = state.masters.iv.find((m) => m.name === 'インスリンサンプル（仮データ）');
    const mealA = state.masters.meal.find((m) => m.name === '食事サンプルA（仮データ）');
    const onsA = state.masters.ons.find((m) => m.name === 'ONSサンプルA（仮データ）');
    if (!ivA || !insS || !mealA || !onsA) { console.warn('[TEST] サンプルマスタが見つかりません'); return; }
    const tempRec = createRecord('_test', todayStr());
    tempRec.iv = [
      { id: 'l1', masterId: ivA.id,  quantity: 1, memo: '' },
      { id: 'l2', masterId: insS.id, quantity: 5, memo: '' },
    ];
    tempRec.meal.lunch = [
      { id: 'l3', masterId: mealA.id, quantity: 1, ratio: 5, memo: '' },
    ];
    tempRec.ons = [
      { id: 'l4', masterId: onsA.id, quantity: 1, ratio: 7, memo: '' },
    ];
    const c = computeAll(tempRec);
    const approx = (a, b) => (a == null ? null : Math.round(a * 100) / 100) === Math.round(b * 100) / 100;
    const cases = [
      ['点滴 energy', c.iv.energy.sum, 200],
      ['点滴 carb',   c.iv.carb.sum,   50],
      ['点滴 water',  c.iv.water.sum,  500],
      ['点滴 insulin',c.iv.insulin.sum,5],
      ['食事 energy', c.meal.energy.sum, 300],
      ['食事 protein',c.meal.protein.sum,12.5],
      ['食事 fat',    c.meal.fat.sum,    10],
      ['食事 carb',   c.meal.carb.sum,   40],
      ['食事 water',  c.meal.water.sum,  150],
      ['ONS energy',  c.ons.energy.sum,  140],
      ['ONS protein', c.ons.protein.sum, 7],
      ['ONS fat',     c.ons.fat.sum,     4.2],
      ['ONS carb',    c.ons.carb.sum,    21],
      ['ONS water',   c.ons.water.sum,   87.5],
      ['合計 energy', c.grand.energy.sum, 640],
      ['合計 protein',c.grand.protein.sum,19.5],
      ['合計 fat',    c.grand.fat.sum,    14.2],
      ['合計 carb',   c.grand.carb.sum,   111],
      ['合計 water',  c.grand.water.sum,  737.5],
      ['糖/I比',      c.carbInsulinRatio, 10],
    ];
    let pass = 0, fail = 0;
    for (const [label, a, b] of cases) {
      if (approx(a, b)) pass++; else { fail++; console.warn('[TEST NG]', label, 'got', a, 'expected', b); }
    }
    console.log('[TEST] 期待値テスト: ' + pass + '/' + (pass + fail) + ' OK');
  } catch (e) {
    console.warn('[TEST] 例外', e);
  }
}

/* ======================================================================
 * 初期化
 * ====================================================================== */
function init() {
  const loaded = loadState();
  if (!loaded || state.masters.iv.length === 0) {
    initSampleMasters();
    const r = createRecord('サンプル症例（動作確認用）', todayStr());
    state.records[r.id] = r;
    state.currentRecordId = r.id;
    saveState();
  }
  setupEvents();
  render();
  runExpectedValueTest();

  // Service worker 登録（ホーム画面追加時のオフライン対応）
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => { /* 静かに失敗 */ });
    });
  }
}

// DOM 構築後に実行
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
